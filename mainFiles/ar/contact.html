        /* whatsapp button styling */
        .whatsapp-button {
            position: fixed;

            right: 15px;
            z-index: 99;
            background: transparent !important;
            border-radius: 50px;
            text-decoration: none;
            width: 70px;

            font-size: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: effect 5s infinite ease-in;
        }

        .whatsapp-button:hover {
            animation: none;
            transition: .7s all;
            border: 1px solid #505050;
        }

        @keyframes effect {
            20%, 100% {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }
            0%, 10% {
                width: 75px;
                height: 75px;
                font-size: 35px;
